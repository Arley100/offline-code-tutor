# Local PostgreSQL for EvalForge / TutorBench Local development.
# Start with:  docker compose up -d
# Matches the DATABASE_URL in .env.example.
services:
  db:
    image: postgres:16
    container_name: evalforge-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: evalforge
    ports:
      - "5433:5432"
    volumes:
      - evalforge_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d evalforge"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  evalforge_pgdata:
